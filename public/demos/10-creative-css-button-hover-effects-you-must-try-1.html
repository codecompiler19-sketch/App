<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Button Hover Effects</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #282c34; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .css-buttons-container {
          display: flex;
          gap: 30px;
          flex-wrap: wrap;
          justify-content: center;
          max-width: 800px;
        }
        .btn {
          padding: 15px 40px;
          font-size: 1.2rem;
          font-weight: 600;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          background: transparent;
          color: white;
          transition: 0.3s;
          z-index: 1;
        }

        /* Button 1: Sweep to Right */
        .btn-1 { border: 2px solid #00d2ff; }
        .btn-1::before {
          content: '';
          position: absolute;
          top: 0; left: 0;
          width: 0%; height: 100%;
          background: #00d2ff;
          transition: 0.3s;
          z-index: -1;
        }
        .btn-1:hover::before { width: 100%; }
        .btn-1:hover { color: #282c34; }

        /* Button 2: Sweep to Top */
        .btn-2 { border: 2px solid #ff007f; }
        .btn-2::before {
          content: '';
          position: absolute;
          bottom: 0; left: 0;
          width: 100%; height: 0%;
          background: #ff007f;
          transition: 0.3s;
          z-index: -1;
        }
        .btn-2:hover::before { height: 100%; }
        .btn-2:hover { color: white; }

        /* Button 3: Diagonal Sweep */
        .btn-3 { border: 2px solid #ffeb3b; color: #ffeb3b; }
        .btn-3::before {
          content: '';
          position: absolute;
          top: 0; left: -100%;
          width: 100%; height: 100%;
          background: #ffeb3b;
          transform: skewX(-45deg);
          transition: 0.5s;
          z-index: -1;
        }
        .btn-3:hover::before { left: 0; transform: skewX(0deg); }
        .btn-3:hover { color: #282c34; }

        /* Button 4: Double Door */
        .btn-4 { border: 2px solid #00e676; }
        .btn-4::before, .btn-4::after {
          content: '';
          position: absolute;
          top: 0; width: 50%; height: 100%;
          background: #00e676;
          transition: 0.3s;
          z-index: -1;
        }
        .btn-4::before { left: -50%; }
        .btn-4::after { right: -50%; }
        .btn-4:hover::before { left: 0; }
        .btn-4:hover::after { right: 0; }
        .btn-4:hover { color: #282c34; }
    </style>
</head>
<body>
    <div class="css-buttons-container">
      <button class="btn btn-1">Hover Me</button>
      <button class="btn btn-2">Hover Me</button>
      <button class="btn btn-3">Hover Me</button>
      <button class="btn btn-4">Hover Me</button>
    </div>
</body>
</html>
