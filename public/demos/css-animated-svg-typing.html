<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SVG Typing - Demo</title>
  <style>
    body { background: #0b0f19; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    svg { width: 80%; max-width: 800px; filter: drop-shadow(0 0 10px #04AA6D); }
    .draw {
      fill: none;
      stroke: #04AA6D;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: drawLine 4s ease forwards infinite 1s;
    }
    .draw-delay { animation-delay: 1.5s; stroke: #38bdf8; filter: drop-shadow(0 0 10px #38bdf8);}
    @keyframes drawLine {
      40% { stroke-dashoffset: 0; fill: transparent; }
      80% { stroke-dashoffset: 0; fill: currentColor; }
      100% { stroke-dashoffset: 0; fill: currentColor; }
    }
  </style>
</head>
<body>
  <!-- Simplified SVG for demo purposes -->
  <svg viewBox="0 0 400 100">
    <path class="draw" d="M30 70 A 20 20 0 0 1 50 30 A 20 20 0 0 1 70 70" />
    <path class="draw draw-delay" d="M 90 70 L 90 30 L 110 30 M 90 50 L 110 50 M 90 70 L 110 70" />
    <path class="draw" d="M 130 30 L 130 70 L 150 70" />
    <path class="draw draw-delay" d="M 170 30 L 170 70 L 190 70" />
    <path class="draw" d="M 210 30 C 210 70 230 70 230 30 C 230 -10 210 -10 210 30" />
    
    <text x="50%" y="95" fill="white" font-family="sans-serif" font-size="12" text-anchor="middle" style="opacity:0; animation: fadeIn 4s infinite 2s;">CODESCOMPILER SVG DEMO</text>
  </svg>
  <style>
    @keyframes fadeIn { 0%, 50% {opacity:0} 60%, 100% {opacity:0.5} }
  </style>
</body>
</html>
