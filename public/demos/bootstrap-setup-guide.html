<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Alert Setup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style> body { padding: 40px; background: #f8f9fa; } </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">Bootstrap 5 Alerts</h1>
    
    <div class="alert alert-primary" role="alert">
      A simple primary alert—check it out!
    </div>
    <div class="alert alert-success" role="alert">
      A simple success alert—perfect for saving forms!
    </div>
    <div class="alert alert-danger" role="alert">
      A simple danger alert—use this for error messages.
    </div>
    
    <hr class="my-5">
    <h2>Buttons too!</h2>
    <button class="btn btn-primary">Primary Button</button>
    <button class="btn btn-outline-success">Outline Success</button>
    <button class="btn btn-danger btn-lg">Large Danger</button>
  </div>
</body>
</html>
